<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#16130f">
<title>DAGMAWIT — Business &amp; Home Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="authView" class="auth-wrap" style="display:none">
  <div class="auth-card">
    <div class="mark">DAGMAWIT</div>
    <h1>Welcome back</h1>
    <p class="auth-sub">Sign in to your shared business tracker.</p>
    <label>Email</label>
    <input id="au_email" type="email" autocomplete="email" placeholder="you@example.com">
    <label>Password</label>
    <input id="au_pass" type="password" autocomplete="current-password" placeholder="Your password">
    <button class="save" id="au_signin">Sign in</button>
    <button class="ghost" id="au_signup">Create a new account</button>
    <div class="auth-msg" id="au_msg"></div>
  </div>
</div>

<div id="appView" style="display:none">
  <header>
    <button id="menuBtn" class="menubtn" aria-label="Menu">&#9776;</button>
    <div class="mark">DAGMAWIT</div>
    <h1 id="hdrTitle">Overview</h1>
    <div class="sub" id="hdrSub">Your business &amp; home, one ledger</div>
    <button id="eyeBtn" class="eyebtn" aria-label="Hide or show money">&#128065;</button>
    <div class="syncpill" id="syncPill">Synced</div>
  </header>
  <div class="wrap"><div id="view"></div></div>
  <nav>
    <div class="navinner">
      <button data-tab="home" class="on"><span class="ni">&#8962;</span>Home</button>
      <button data-tab="orders"><span class="ni">&#9776;</span>Orders</button>
      <button class="add" id="addBtn"><span class="plus">+</span></button>
      <button data-tab="expenses"><span class="ni">&#8645;</span>Expenses</button>
      <button data-tab="reports"><span class="ni">&#9202;</span>Reports</button>
    </div>
  </nav>

  <div class="sidescrim" id="sideScrim"></div>
  <div class="sidemenu" id="sideMenu">
    <div class="sidehead"><div class="mark">DAGMAWIT</div><button id="sideClose" class="sheetclose" style="position:static">&times;</button></div>
    <button class="sideitem" data-go="measurements"><span class="si-ic">&#128207;</span>Measurements</button>
    <button class="sideitem" data-go="loans"><span class="si-ic">&#9672;</span>Loans</button>
    <button class="sideitem" data-go="audit"><span class="si-ic">&#129518;</span>Financial audit</button>
    <button class="sideitem" data-go="reports"><span class="si-ic">&#9620;</span>Reports</button>
    <button class="sideitem" data-go="settings"><span class="si-ic">&#9881;</span>Settings &amp; account</button>
  </div>
</div>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"><div class="inner" id="sheetInner"></div></div>
<div class="toast" id="toast"></div>
<div id="loadingView" class="loading"><div class="spinner"></div><div>Loading…</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(e=>console.log('SW reg failed',e));});
}
</script>
</body>
</html>
