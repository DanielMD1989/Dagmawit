<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f7f5f1">
<meta name="apple-mobile-web-app-title" content="DAGMAWIT">
<title>DAGMAWIT — Business &amp; Home Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="authView" class="auth-wrap" style="display:none">
  <div class="auth-card">
    <div class="mark">DAGMAWIT</div>
    <h1>Welcome back</h1>
    <p class="auth-sub">Sign in to your shared business tracker.</p>
    <label>Email</label>
    <input id="au_email" type="email" autocomplete="email" placeholder="you@example.com">
    <label>Password</label>
    <input id="au_pass" type="password" autocomplete="current-password" placeholder="Your password">
    <button class="save" id="au_signin">Sign in</button>
    <button class="ghost" id="au_signup">Create a new account</button>
    <div class="auth-msg" id="au_msg"></div>
  </div>
</div>

<div id="appView" style="display:none">
  <header>
    <button id="menuBtn" class="menubtn" aria-label="Menu">&#9776;</button>
    <div class="mark">DAGMAWIT</div>
    <h1 id="hdrTitle">Overview</h1>
    <div class="sub" id="hdrSub">Your business &amp; home, one ledger</div>
    <button id="eyeBtn" class="eyebtn" aria-label="Hide or show money">&#128065;</button>
    <div class="syncpill" id="syncPill">Synced</div>
  </header>
  <div class="wrap"><div id="view"></div></div>
  <nav>
    <div class="navinner">
      <button data-tab="home" class="on"><span class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l-2 0l9 -9l9 9l-2 0"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7"/><path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6"/></svg></span>Home</button>
      <button data-tab="orders"><span class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5h-2a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-12a2 2 0 0 0 -2 -2h-2"/><path d="M9 3m0 2a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v0a2 2 0 0 1 -2 2h-2a2 2 0 0 1 -2 -2z"/><path d="M9 12l2 2l4 -4"/></svg></span>Orders</button>
      <button class="add" id="addBtn"><span class="plus">+</span></button>
      <button data-tab="expenses"><span class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8v-3a1 1 0 0 0 -1 -1h-10a2 2 0 0 0 0 4h12a1 1 0 0 1 1 1v3m0 4v3a1 1 0 0 1 -1 1h-12a2 2 0 0 1 -2 -2v-12"/><path d="M20 12v4h-4a2 2 0 0 1 0 -4h4"/></svg></span>Expenses</button>
      <button data-tab="reports"><span class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M9 17v-5"/><path d="M13 17v-3"/><path d="M17 17v-7"/></svg></span>Reports</button>
    </div>
  </nav>

  <div class="sidescrim" id="sideScrim"></div>
  <div class="sidemenu" id="sideMenu">
    <div class="sidehead"><div class="mark">DAGMAWIT</div><button id="sideClose" class="sheetclose" style="position:static">&times;</button></div>
    <button class="sideitem" data-go="measurements"><span class="si-ic">&#128207;</span>Measurements</button>
    <button class="sideitem" data-go="loans"><span class="si-ic">&#9672;</span>Loans</button>
    <button class="sideitem" data-go="assets"><span class="si-ic">&#127981;</span>Assets</button>
    <button class="sideitem" data-go="audit"><span class="si-ic">&#129518;</span>Financial audit</button>
    <button class="sideitem" data-go="reports"><span class="si-ic">&#9620;</span>Reports</button>
    <button class="sideitem" data-go="settings"><span class="si-ic">&#9881;</span>Settings &amp; account</button>
  </div>
</div>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"><div class="inner" id="sheetInner"></div></div>
<div class="toast" id="toast"></div>
<div id="loadingView" class="loading"><div class="spinner"></div><div>Loading…</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').then(reg=>{
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;
        if(nw){nw.addEventListener('statechange',()=>{
          if(nw.state==='installed' && navigator.serviceWorker.controller){
            nw.postMessage&&nw.postMessage('skipWaiting');
          }
        });}
      });
      reg.update();
    }).catch(e=>console.log('SW reg failed',e));
    let reloaded=false;
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      if(reloaded)return;reloaded=true;window.location.reload();
    });
  });
}
</script>
</body>
</html>
